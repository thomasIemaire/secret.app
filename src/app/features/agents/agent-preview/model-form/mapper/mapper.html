<div class="form__wrapper" *ngFor="let node of mapper; index as i; trackBy: trackByIndex">
    <div class="group-inputs">
        <input pInputText type="text" [(ngModel)]="node.label" (ngModelChange)="emitJson()" pSize="small"
            style="max-width: 256px;" [pAutoFocus]="isLastNode(node)" (blur)="removeNodeIfEmpty(node)" />
        <p-button *ngIf="!node.children.length && node.label" icon="pi pi-plus" variant="text" severity="secondary" size="small"
            (click)="addChild(node)" [pTooltip]="`Ajouter un enfant à ${node.label}`"></p-button>

        <p-button *ngIf="!node.children.length && node.label" icon="pi pi-info-circle" variant="text" severity="secondary" size="small"
            [pTooltip]="node.key"></p-button>
    </div>

    <app-mapper style="padding-left: 4rem;" [mapper]="node.children" (jsonChange)="onChildJsonChange()" />

    <p-button *ngIf="isLastNode(node) && node.label" icon="pi pi-plus" variant="text" severity="secondary" size="small"
        (click)="addNode(node.parent)" [pTooltip]="`Ajouter un enfant à ${node.parent?.label ?? 'root'}`"></p-button>
</div>
