<div class="model-form__wrapper">
    <div class="form__wrapper">
        <p-divider align="left" type="solid">
            Informations générales
        </p-divider>

        <div class="group-inputs">
            <input pInputText [(ngModel)]="model.name" type="text" pSize="small" placeholder="Nom" />
            <input pInputText [(ngModel)]="model.reference" type="text" pSize="small" placeholder="Référence" />
        </div>
        <div class="group-inputs">
            <input pInputText [(ngModel)]="model.description" type="text" pSize="small" placeholder="Description" />
        </div>

        <p-divider align="left" type="solid">
            Mapper
        </p-divider>

        <app-mapper [json]="model.mapper" [isRoot]="true" (jsonChange)="model.mapper = $event" />
    </div>
</div>
