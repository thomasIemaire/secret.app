<div class="formats-form__wrapper">
    <div class="form__wrapper">
        <div class="group-inputs" *ngFor="let format of formats; let i = index">
            <input pInputText [(ngModel)]="formats[i].format" (blur)="onItemChange(); edit = false" [pAutoFocus]="true"
                type="text" placeholder="Format" pSize="small" *ngIf="edit" />

            <!-- Affichage tokenisé en lecture -->
            <div class="format-token" *ngIf="!edit" (click)="edit = true">
                <ng-container *ngIf="formats[i]?.format; else emptyFormat">
                    <ng-container *ngFor="let t of tokensOf(formats[i].format)">
                        <span *ngIf="t.key; else plain" class="entity-in-example" [pTooltip]="t.key"
                            tooltipPosition="top">{{ t.text }}</span>
                        <ng-template #plain>{{ t.text }}</ng-template>
                    </ng-container>
                </ng-container>
                <ng-template #emptyFormat>Aucun format</ng-template>
            </div>

            <p-button icon="pi pi-trash" variant="text" severity="danger" size="small" pTooltip="Supprimer"
                (click)="removeFormat(i)"></p-button>
        </div>

        <p-button icon="pi pi-plus" text severity="secondary" size="small" pTooltip="Ajouter un format"
            (click)="addFormat()"></p-button>
    </div>
</div>
