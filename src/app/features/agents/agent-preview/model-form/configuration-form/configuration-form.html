<div class="configuration-form__wrapper">
    <div class="form__wrapper">
        <div class="group-inputs">
            <input pInputText [(ngModel)]="configuration.name" type="text" pSize="small" placeholder="Nom" />
        </div>
        <div class="group-inputs">
            <app-attributes-form [attributes]="configuration?.attributes" />
        </div>
        <div class="group-inputs">
            <app-formats-form [formats]="configuration?.formats" />
        </div>
    </div>
</div>
