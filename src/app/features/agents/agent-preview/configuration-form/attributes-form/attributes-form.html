<div class="attributes-form__wrapper">
    <div class="form__wrapper">
        <div *ngFor="let attribute of attributes; let i = index" class="group-inputs attribute-item">
            <p-select class="attribute-key" type="text" size="small" [(ngModel)]="attribute.key" [options]="keys"
                optionLabel="value" optionValue="value" [editable]="true" placeholder="Attribute Key" appendTo="body" />

            <p-select class="attribute-type" size="small" [options]="typeOptions" [(ngModel)]="attribute.value.type"
                optionLabel="label" optionValue="value" placeholder="Select Type" appendTo="body" />

            <div class="unified-inputs">
                <p-select class="attribute-rule" size="small" [options]="ruleOptions" [(ngModel)]="attribute.value.rule"
                    optionLabel="label" optionValue="value" placeholder="Select rule" appendTo="body" />
                @switch (attribute.value.rule) {
                @case('randint') {
                <input class="attribute-rule-randint-param" pInputText type="text" pSize="small"
                    [(ngModel)]="attribute.value.parameters.min" placeholder="Min" />
                <input class="attribute-rule-randint-param" pInputText type="text" pSize="small"
                    [(ngModel)]="attribute.value.parameters.max" placeholder="Max" />
                }
                @case('alphanum') {
                <input class="attribute-rule-alphanum-param" pInputText type="text" pSize="small"
                    [(ngModel)]="attribute.value.parameters.regex" placeholder="regex" />
                }
                @case ('data') {
                <p-select class="attribute-rule-param-objectid" size="small" [options]="app.data"
                    [(ngModel)]="attribute.value.parameters.object_id" optionLabel="name" optionValue="_id"
                    placeholder="Select Object" appendTo="body">
                    <ng-template let-option pTemplate="item">
                        <div class="with-actions">
                            <span class="item-label">{{ option.name }}</span>
                            <i class="pi pi-trash action" variant="text" severity="secondary" size="small"
                                (click)="$event.stopPropagation(); deleteData(option._id)"
                                (mousedown)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()"
                                (keydown.space)="$event.stopPropagation()"></i>
                        </div>
                    </ng-template>
                    <ng-template pTemplate="footer">
                        <p-button label="Nouveau" severity="secondary" text size="small" icon="pi pi-plus"
                            (click)="openDataDialog(attribute.value.parameters.object_id, attribute)" />
                    </ng-template>
                </p-select>
                <p-button class="attribute-rule-param-column" icon="pi pi-eye" severity="secondary" text size="small"
                    pTooltip="Voir la data" appendTo="body"
                    (click)="openDataDialog(attribute.value.parameters.object_id, attribute, 'edit')"></p-button>
                }
                @case ('configuration') {
                <p-select class="attribute-rule-param-objectid" size="small" [options]="app.configurations"
                    [(ngModel)]="attribute.value.parameters.object_id" optionLabel="name" optionValue="_id"
                    placeholder="Select Object" appendTo="body">
                    <ng-template let-option pTemplate="item">
                        <div class="with-actions">
                            <span class="item-label">{{ option.name }}</span>
                            <i class="pi pi-trash action" variant="text" severity="secondary" size="small"
                                (click)="$event.stopPropagation(); deleteConfiguration(option._id)"
                                (mousedown)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()"
                                (keydown.space)="$event.stopPropagation()"></i>
                        </div>
                    </ng-template>
                    <ng-template pTemplate="footer">
                        <p-button label="Nouveau" severity="secondary" text size="small" icon="pi pi-plus"
                            (click)="openConfigurationDialog(attribute.value.parameters.object_id, attribute)" />
                    </ng-template>
                </p-select>
                <p-button class="attribute-rule-param-column" icon="pi pi-eye" severity="secondary" text size="small"
                    pTooltip="Voir la configuration" appendTo="body"
                    (click)="openConfigurationDialog(attribute.value.parameters.object_id, attribute, 'edit')"></p-button>
                }
                }
            </div>

            <p-multiselect class="attribute-requirements" [(ngModel)]="attribute.requirements"
                [options]="attribute.requirements" optionLabel="rule" display="chip" [filter]="false"
                [showToggleAll]="false" size="small" placeholder="Requirements" appendTo="body">
                <ng-template let-requirement #item>
                    <div class="with-actions">
                        <span class="item-label">{{ requirement.rule }}</span>
                        <i class="pi pi-eye action" variant="text" severity="secondary" size="small"
                            (click)="$event.stopPropagation(); openRequirementDialog(attribute, requirement, 'edit')"
                            (mousedown)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()"
                            (keydown.space)="$event.stopPropagation()"></i>
                    </div>
                </ng-template>
                <ng-template pTemplate="footer">
                    <p-button label="Nouveau" severity="secondary" text size="small" icon="pi pi-plus"
                        (click)="openRequirementDialog(attribute)" />
                </ng-template>
            </p-multiselect>

            <input class="attribute-frequency" pInputText type="text" pSize="small" [(ngModel)]="attribute.frequency"
                placeholder="Frequency" />
            <p-button icon="pi pi-trash" variant="text" severity="danger" size="small"
                [pTooltip]="`Supprimer ${attribute.key}`" (click)="removeAttribute(i)"></p-button>
        </div>
        <p-button icon="pi pi-plus" text severity="secondary" size="small" tooltipPosition="left"
            pTooltip="Ajouter un attribut" (click)="addAttribute()"></p-button>
    </div>
</div>
