<div class="agent-preview__container">
    <div>
        <p-breadcrumb [model]="breadcrumb"></p-breadcrumb>
    </div>

    <div class="model-form__wrapper">
        <p-divider align="left" type="solid">
            Informations générales
        </p-divider>

        <app-model-form [model]="model" (modelChange)="model = $event" />

        <p-divider align="left" type="solid">
            Mapper
        </p-divider>

        <app-mapper [json]="model.mapper" [root]="model.reference ?? 'root'" [isRoot]="true"
            (jsonChange)="model.mapper = $event" (keysChange)="updateKeys($event)" />

        <p-divider align="left" type="solid">
            Configuration
        </p-divider>

        <app-configuration-form [configuration]="configuration" [keys]="keys" />
    </div>

    <div class="agent-preview__actions">
        <p-button size="small" label="Annuler" severity="secondary" variant="text" (click)="cancel()"></p-button>
        <p-button size="small" label="Sauvegarder" severity="secondary" (click)="saveModel()"></p-button>
    </div>
</div>
