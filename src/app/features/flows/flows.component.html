<div class="flows">
    <div class="flows__wrapper">
        <div class="left__content" [class.mobile__section-hide]="router.url !== '/flows'">
            <div class="flows__filters">
                <input pInputText [(ngModel)]="search" type="text" pSize="small" placeholder="Rechercher un Flow" />
                <div class="filters__type">
                    <span class="filters__type-desc">Trier par</span>
                    <p-select [(ngModel)]="filterOn" [options]="filters" optionLabel="name" optionValue="value"
                        size="small" placeholder="Small" class="w-full md:w-56" />
                    <p-button [icon]="orderBy === 'asc' ? 'pi pi-sort-amount-up' : 'pi pi-sort-amount-down'"
                        [text]="true" severity="secondary" size="small" (click)="toggleOrder()" />
                </div>
            </div>

            <div class="flows__grid">
                <div class="flow__add">
                    <i class="pi pi-plus"></i>
                </div>
                <div class="flow__item" *ngFor="let flow of filteredFlows" [routerLink]="['/flows', flow.id]"
                    routerLinkActive="active">
                    <div class="flow__head">
                        <div class="flow__item-title">{{ flow.name }}</div>
                        <p-tag [value]="flow.status"
                            [severity]="flow.status === 'active' ? 'success' : flow.status === 'inactive' ? 'warn' : 'danger'" />
                    </div>
                    <div class="flow__item-description">{{ flow.description }}</div>
                    <div class="flow__foot">
                        <div class="flow__item-files">{{ flow.files }}</div>
                        <div class="flow__item-updated">
                            MAJ {{ flow.updatedAt | date: 'dd/MM/yyyy HH:mm' }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right__content" [class.mobile__section-hide]="router.url === '/flows'">
            @if (router.url === '/flows') {
            Aucun Flow sélectionné
            } @else {
            <router-outlet></router-outlet>
            }
        </div>
    </div>
</div>
